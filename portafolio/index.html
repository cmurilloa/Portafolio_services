<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Servicios y productos aérea metropolitana</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/filtros.css">
    <link rel="stylesheet" href="css/footer.css">
</head>

<body>

    <!-- NAVBAR --.>
    <header>
        <nav class="main-nav">
            <nav class="nav1">
                <h1>
                    <span class="nombre-servicios">Servicios</span><span class="nombre-local">Local</span>
                </h1>
            </nav>
            <nav class="navbar links-nav">
                <a href="#"> Categorias</a>
                <a href="#"> Publicar Servicios</a>
                <a href="#"> Iniciar Sesión</a>
                <button class="button-header" type="submit" class="search-button">Buscar 🔍</button>
            </nav>
        </nav>

    </header>

    <!-- HERO BUSCADOR -->
    <section class="hero">
        <h1>¿Qué buscas? ¿Dónde?</h1>

        <div class="search-box">
            <input type="text"  id="inputBusqueda" placeholder="Ej: Plomería, Electricista...">

            <select id="selectMunicipio">
                <option value="">Selecciona municipio</option>
                <option>Medellín</option>
                <option>Bello</option>
                <option>Envigado</option>
                <option>Itagüí</option>
                <option>Sabaneta</option>
                <option>La Estrella</option>
                <option>Copacabana</option>
                <option>Girardota</option>
                <option>Caldas</option>
            </select>

            <button type="button" id="btnBuscarHero" class="search-button">Buscar 🔍</button>
        </div>
    </section>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="layout">

        <!-- FILTROS -->
        <aside class="filters">
            <div>
                <h3>Filtros</h3>
            </div>
            <br>
            <div>
                <h4>Ordenar por</h4>
            </div>
            <div>
                <select name="filtro-ordenar" id="filtro-ordenar">
                    <option value=""></option>
                    <option> Tipo</option>
                    <option> Servicio</option>
                    <option> Producto</option>
                    <option> Municipio</option>
                    <option> Calificación</option>
                </select>
            </div>
            <br>
            <div>
                <h4>Calificación</h4>
            </div>
            <div class="filtros-clasi-wrap">
                <button class="filtro-clasi" type="button"><span class="star-llena">★★★★★</span></button>
                <button class="filtro-clasi" type="button"><span class="star-llena">★★★★</span><span
                        class="star-vacia">☆</span> & más</button>
                <button class="filtro-clasi" type="button"><span class="star-llena">★★★</span><span
                        class="star-vacia">☆☆</span> & más</button>
                <button class="filtro-clasi" type="button"><span class="star-llena">★★</span><span
                        class="star-vacia">☆☆☆</span> & más</button>
                <button class="filtro-clasi" type="button"><span class="star-llena">★</span><span
                        class="star-vacia">☆☆☆☆</span> & más</button>
            </div>
            <br>
            <div>
                <div>
                    <h4>Tipo</h4>
                </div>
                <br>
                <div class="vertical-checkbox">
                    <label>
                        <input type="checkbox" name="Productos" value="valor1">
                        Productos</label>
                    <label>
                        <input type="checkbox" name="Servicios" value="valor2">
                        Servicios</label>
                </div>

            </div>

        </aside>

        <!-- RESULTADOS -->
        <div class="results-container">
        
        </div>

        <!-- MAPA -->
        <aside class="map">
            <h3>Mapa</h3>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d31729.484888366733!2d-75.6091692!3d6.2392506!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2sco!4v1772142961700!5m2!1ses!2sco"
                loading="lazy" allowfullscreen="" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </aside>

    </main>

    <hr>
    <footer>
        <nav class="main-nav">
            <nav class="navbar links-foot">
                <a href="#"> Sobre nosotros</a>
                <a href="#"> Privacidad</a>
                <a href="#"> Términos de uso</a>
                <a href="#"> Contacto</a>
                <a href="#"> Ayuda</a>
            </nav>
        </nav>
        <p>&copy; 2026 ServiciosLocal. Todos los derechos reservados.</p>
    </footer>
<script src="js/script.js"></script>
</body>

</html>
